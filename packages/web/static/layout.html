<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{title}} | AutoMod</title>

		<link rel="stylesheet" href="{{base_path}}/styles/base/reset.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/base/global.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/base/type.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/components/navbar.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/components/input.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/pages/index.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/pages/server.css" />
		<link rel="stylesheet" href="{{base_path}}/styles/pages/login.css" />

		<link rel="preload" href="{{base_path}}/typefaces/Outfit.woff2" as="font" type="font/woff2" />
		<link rel="preload" href="{{base_path}}/typefaces/FiraCode.woff2" as="font" type="font/woff2" />

		<link rel="icon" type="image/svg+xml" href="https://automod.vale.rocks/assets/favicons/favicon.svg" />

		<link rel="apple-touch-icon" sizes="512x512" href="https://automod.vale.rocks/assets/favicons/apple-touch-icon.png" />

		<meta property="og:image" content="https://automod.vale.rocks/assets/og_image.webp" />
		<meta property="og:image:type" content="image/webp" />
		<meta property="og:image:width" content="1000" />
		<meta property="og:image:height" content="495" />
		<meta property="og:image:alt" content="The AutoMod logo, featuring a shield with a strike in it and the text 'AutoMod' on a background of repeating icons in a rainbow gradient." />

		<meta property="og:site_name" content="AutoMod" />
		<meta property="og:locale" content="en_AU" />

		<meta name="creator" content="vale.rocks" />
		<meta name="contact" content="https://vale.rocks/contact" />
		<meta property="og:site" content="AutoMod" />
		<meta property="og:type" content="website" />

		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="oklch(100% 0 360)" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="oklch(13.3% 0.0392 254.4)" media="(prefers-color-scheme: dark)" />

		<link rel="alternate" type="application/rss+xml" title="RSS feed of AutoMod blog posts." href="https://automod.vale.rocks/blog/feed.xml" />
		<link rel="alternate" type="application/json" title="JSON feed of AutoMod blog posts." href="https://automod.vale.rocks/blog/feed.json" />
		<link rel="search" type="application/opensearchdescription+xml" title="AutoMod Search" href="https://automod.vale.rocks/opensearch.xml" />
	</head>
	<body>
		<header id="navbar">
			<div class="skip-link">Skip to <a href="#main">content</a>, <a href="#footer">footer</a></div>
			<nav>
				<a href="/" id="navlanding">AutoMod</a>
				<span id="nav-right"></span>
			</nav>
		</header>
		<script src="{{base_path}}/config.js"></script>
		<script src="{{base_path}}/js/helpers.js"></script>
		<main id="content">{{content}}</main>
		<footer id="footer">
			<p>Dashboard for <a href="https://automod.vale.rocks">AutoMod</a> for Stoat</p>
		</footer>
	</body>
</html>
